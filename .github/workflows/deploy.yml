name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Replace file: links with npm versions for CI
      - name: Swap local deps for npm packages
        run: |
          sed -i 's|"footprintjs": "file:../footPrint"|"footprintjs": "^1.0.0"|' package.json
          sed -i 's|"footprint-explainable-ui": "file:../explainable-ui"|"footprint-explainable-ui": "^0.12.0"|' package.json

      - run: npm install
      # Skip tsc type-checking in CI (executeCode.ts monkey-patches internal classes)
      # Vite handles transpilation via sucrase
      - run: npx vite build
      - run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
