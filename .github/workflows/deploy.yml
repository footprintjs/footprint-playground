name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Check out footPrint so the symlink src/samples/examples -> ../../../footPrint/examples resolves.
      - uses: actions/checkout@v4
        with:
          path: footprint-playground

      - uses: actions/checkout@v4
        with:
          repository: footprintjs/footPrint
          path: footPrint

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Replace file: links with npm versions for CI
      - name: Swap local deps for npm packages
        working-directory: footprint-playground
        run: |
          sed -i 's|"footprintjs": "file:../footPrint"|"footprintjs": "^4.12.0"|' package.json
          sed -i 's|"footprint-explainable-ui": "file:../explainable-ui"|"footprint-explainable-ui": "^0.16.0"|' package.json
          rm -f package-lock.json

      - run: npm install
        working-directory: footprint-playground

      # Skip tsc type-checking in CI (executeCode.ts monkey-patches internal classes)
      # Vite handles transpilation via sucrase
      - run: npx vite build
        working-directory: footprint-playground

      - run: cp dist/index.html dist/404.html
        working-directory: footprint-playground

      - uses: actions/upload-pages-artifact@v3
        with:
          path: footprint-playground/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
